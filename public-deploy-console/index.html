<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Public Deploy Console</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="console">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">Soulhouse public deploy</p>
          <h1>Build and publish a browser app from a prompt.</h1>
        </div>

        <form id="deployForm" class="deploy-form">
          <label>
            Deploy passcode
            <input id="passcode" name="passcode" type="password" autocomplete="off" required>
          </label>

          <p class="auto-path">The public address is assigned automatically after deployment.</p>

          <fieldset class="mode-field">
            <legend>Deploy mode</legend>
            <label class="mode-option">
              <input type="radio" name="deployMode" value="standard">
              <span>
                <strong>PUBLIC DEPLOY</strong>
                <small>Responsive browser app</small>
              </span>
            </label>
            <label class="mode-option">
              <input type="radio" name="deployMode" value="mobile">
              <span>
                <strong>PUBLIC MOBILE DEPLOY</strong>
                <small>Phone-first layout and touch controls</small>
              </span>
            </label>
          </fieldset>

          <label>
            Prompt
            <textarea id="prompt" name="prompt" rows="8" required></textarea>
          </label>

          <button id="submitButton" type="submit">Start deployment</button>
        </form>
      </section>

      <section class="panel status-panel" aria-live="polite">
        <p class="eyebrow">Progress</p>
        <ol id="steps" class="steps">
          <li class="is-current">Waiting for a request</li>
        </ol>
        <div id="result" class="result"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
