name: Deploy static app to Plesk

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_slug:
        description: App folder and public URL slug
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_SLUG: web-console-test-game-2

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Choose app slug
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_SLUG=${{ inputs.app_slug }}" >> "$GITHUB_ENV"
          fi

      - name: Validate static app folder
        run: |
          test -f "$APP_SLUG/index.html"

      - name: Check JavaScript syntax
        run: |
          find "$APP_SLUG" -name "*.js" -type f -print0 | xargs -0 -r -n 1 node --check

      - name: Deploy folder to Plesk
        env:
          FTP_HOST: ${{ secrets.PLESK_HOST }}
          FTP_USERNAME: ${{ secrets.PLESK_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
          FTP_PORT: ${{ secrets.PLESK_PORT }}
          TARGET_BASE: ${{ secrets.PLESK_TARGET_BASE }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$APP_SLUG"

          find . -type f | while read -r file; do
            remote_file="${file#./}"
            remote_url="ftp://${FTP_HOST}:${FTP_PORT}/${TARGET_BASE}/${APP_SLUG}/${remote_file}"
            echo "Uploading ${remote_file}"
            curl --fail --show-error --silent \
              --ssl-reqd --insecure --ftp-create-dirs \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --upload-file "${file}" \
              "${remote_url}"
          done
