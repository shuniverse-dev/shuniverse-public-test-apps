name: AI Public Deploy
run-name: AI deploy ${{ inputs.app_slug }} (${{ inputs.request_id }})

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Request id from the public deploy console
        required: true
        type: string
      app_slug:
        description: App folder and public URL slug
        required: true
        type: string
      prompt:
        description: PUBLIC DEPLOY prompt instructions
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      APP_SLUG: ${{ inputs.app_slug }}
      PUBLIC_DEPLOY_PROMPT: ${{ inputs.prompt }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate request
        shell: bash
        run: |
          set -euo pipefail
          [[ "$APP_SLUG" =~ ^[a-z0-9-]+$ ]]
          test -n "$PUBLIC_DEPLOY_PROMPT"

      - name: Generate static app
        run: node scripts/ai-generate-static-app.mjs

      - name: Check JavaScript syntax
        run: |
          find "$APP_SLUG" -name "*.js" -type f -print0 | xargs -0 -r -n 1 node --check

      - name: Commit generated app
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "shuniverse-public-deploy-bot"
          git config user.email "shuniverse-dev@users.noreply.github.com"
          git add "$APP_SLUG"
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "AI deploy ${APP_SLUG} [skip ci]"
            git push
          fi

      - name: Deploy folder to Plesk
        env:
          FTP_HOST: ${{ secrets.PLESK_HOST }}
          FTP_USERNAME: ${{ secrets.PLESK_USERNAME }}
          FTP_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
          FTP_PORT: ${{ secrets.PLESK_PORT }}
          TARGET_BASE: ${{ secrets.PLESK_TARGET_BASE }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$APP_SLUG"

          find . -type f | while read -r file; do
            remote_file="${file#./}"
            remote_url="ftp://${FTP_HOST}:${FTP_PORT}/${TARGET_BASE}/${APP_SLUG}/${remote_file}"
            echo "Uploading ${remote_file}"
            curl --fail --show-error --silent \
              --ssl-reqd --insecure --ftp-create-dirs \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              --upload-file "${file}" \
              "${remote_url}"
          done

      - name: Print public URL
        run: echo "https://soulhouseproductions.com/${APP_SLUG}/"
